<!-- pages/initiatives.html — credit/debit tracking for activities outside the trip system (e.g. Shikkhon training/dorm) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Initiatives · Vromonkonna Finance Suite</title>

  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/trip-history.css" />
  <link rel="stylesheet" href="../css/funds.css" />

</head>
<body>
  <div class="app-shell" data-sidebar-open="false">
    <div id="sidebar-slot"></div>

    <div class="app-main">
      <div id="topbar-slot"></div>

      <main class="app-content">
        <div class="page-header">
          <div class="page-header__titles">
            <h1>Initiatives</h1>
            <p class="page-header__subtitle">Credit and debit for activities outside the trip system — e.g. Shikkhon (training, dorm, etc.)</p>
          </div>
          <div class="page-header__actions">
            <button type="button" class="btn btn-primary" id="add-entry-btn">
              <i class="ti ti-plus" aria-hidden="true"></i> Add entry
            </button>
          </div>
        </div>

        <div class="stat-grid" id="stat-grid"></div>

        <div class="panel" style="margin-top: var(--space-5);">
          <div class="history-toolbar">
            <select class="field__control" id="initiative-filter" style="max-width: 260px;">
              <option value="all">All initiatives</option>
            </select>
          </div>

          <div class="data-table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Initiative</th>
                  <th>Description</th>
                  <th>Type</th>
                  <th>Amount</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="entries-body"></tbody>
            </table>
          </div>
          <div class="trip-history-empty" id="entries-empty" hidden>No entries yet — add your first credit or debit above.</div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="../js/initiatives.js"></script>
</body>
</html>
