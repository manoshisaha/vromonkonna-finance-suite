<!-- pages/funds.html — Social Media Fund, T-shirt Fund, and Organization Profit ledgers -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Funds · Vromonkonna Finance Suite</title>

  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/trip-history.css" />
  <link rel="stylesheet" href="../css/funds.css" />

</head>
<body>
  <div class="app-shell" data-sidebar-open="false">
    <div id="sidebar-slot"></div>

    <div class="app-main">
      <div id="topbar-slot"></div>

      <main class="app-content">
        <div class="page-header">
          <div class="page-header__titles">
            <h1>Funds</h1>
            <p class="page-header__subtitle">Balances and transaction history for every organizational fund</p>
          </div>
        </div>

        <div class="panel">
          <div class="fund-tabs" id="fund-tabs" role="tablist"></div>

          <div class="fund-balance-hero">
            <div>
              <div class="fund-balance-hero__label" id="fund-balance-label">Current balance</div>
              <div class="fund-balance-hero__value" id="fund-balance-value">৳0</div>
            </div>
            <button type="button" class="btn btn-secondary" id="add-withdrawal-btn">
              <i class="ti ti-minus" aria-hidden="true"></i> Add withdrawal / adjustment
            </button>
          </div>

          <div class="data-table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Description</th>
                  <th>Type</th>
                  <th>Amount</th>
                  <th>Balance</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="ledger-body"></tbody>
            </table>
          </div>
          <div class="trip-history-empty" id="ledger-empty" hidden>No transactions yet for this fund.</div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="../js/funds.js"></script>
</body>
</html>
